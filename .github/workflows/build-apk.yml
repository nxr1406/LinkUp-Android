name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install
      - name: Build web
        run: npm run build
      - name: Install Capacitor
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "LinkUp" "com.linkup.app" --web-dir=dist
          npx cap add android
          npx cap sync
      - name: Fix Kotlin
        run: |
          cd android
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.0"/' build.gradle
          echo "" >> app/build.gradle
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0' } }" >> app/build.gradle
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: linkup-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk