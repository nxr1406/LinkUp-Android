name: linkup
description: LinkUp - A private messaging app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^12.1.3

  # Image
  cached_network_image: ^3.3.1
  image_picker: ^1.0.5

  # Networking
  http: ^1.1.2

  # Utils
  timeago: ^3.6.0
  intl: ^0.18.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true