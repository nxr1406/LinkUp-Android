name: linkup_chat_app
description: LinkUp - Modern Instagram-style Chat Application
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.9
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Authentication
  google_sign_in: ^6.1.5
  
  # Image Upload
  image_picker: ^1.0.5
  dio: ^5.4.0
  
  # Utilities
  intl: ^0.18.1
  timeago: ^3.6.0
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.2
  emoji_picker_flutter: ^1.6.2
  
  # Chat Features (9.3.11 needs intl ^0.18.x)
  flutter_quill: ^9.3.11
  
  # WebRTC for calls
  flutter_webrtc: ^0.9.47
  web_socket_channel: ^2.4.0
  
  # Local Notifications
  flutter_local_notifications: ^16.3.0
  
  # Image Processing
  image_cropper: ^5.0.0
  
  # Others
  url_launcher: ^6.2.1
  connectivity_plus: ^5.0.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env
